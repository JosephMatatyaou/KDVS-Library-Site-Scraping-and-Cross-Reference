name: Build TheCharter3000

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt pyinstaller
    - run: |
        pyinstaller --onefile --windowed --icon=assets/icon.ico --name "TheCharter3000" MergedKDVSApp.py
        cd dist
        7z a TheCharter3000-Windows.zip TheCharter3000.exe
    - uses: actions/upload-artifact@v4
      with:
        name: TheCharter3000-Windows
        path: dist/TheCharter3000-Windows.zip

  release:
    needs: build-windows
    runs-on: ubuntu-latest
    steps:
    - uses: actions/download-artifact@v4
    - uses: softprops/action-gh-release@v2
      with:
        files: TheCharter3000-Windows/TheCharter3000-Windows.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
