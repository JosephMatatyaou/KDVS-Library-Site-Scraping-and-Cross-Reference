name: Build TheCharter3000

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build on macOS
      if: runner.os == 'macOS'
      run: |
        pyinstaller --onefile --windowed --name "TheCharter3000" MergedKDVSApp.py
        cd dist
        zip -r TheCharter3000-macOS.zip TheCharter3000.app
        ls -lh TheCharter3000-macOS.zip

    - name: Build on Windows
      if: runner.os == 'Windows'
      run: |
        pyinstaller --onefile --windowed --icon=assets/icon.ico --name "TheCharter3000" MergedKDVSApp.py
        cd dist
        7z a TheCharter3000-Windows.zip TheCharter3000.exe
        dir TheCharter3000-Windows.zip

    - name: Upload macOS artifact
      if: runner.os == 'macOS'
      uses: actions/upload-artifact@v3
      with:
        name: TheCharter3000-macOS
        path: dist/TheCharter3000-macOS.zip

    - name: Upload Windows artifact
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v3
      with:
        name: TheCharter3000-Windows
        path: dist/TheCharter3000-Windows.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v3
      with:
        path: artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/*/TheCharter3000-*.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
