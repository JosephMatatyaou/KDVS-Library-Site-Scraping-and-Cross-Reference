name: Build TheCharter3000

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - run: |
        python -m pip install --upgrade pip
        pip install -r requirements-build.txt
    - run: ./scripts/build_windows.ps1
      shell: pwsh
    - uses: actions/upload-artifact@v4
      with:
        name: TheCharter3000-Windows
        path: dist/TheCharter3000-Windows.zip

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - run: |
        python -m pip install --upgrade pip
        pip install -r requirements-build.txt
    - run: chmod +x ./scripts/build_macos.sh
    - run: ./scripts/build_macos.sh
    - uses: actions/upload-artifact@v4
      with:
        name: TheCharter3000-macOS
        path: dist/TheCharter3000-macOS.zip

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
    - build-windows
    - build-macos
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/download-artifact@v4
      with:
        path: artifacts
    - uses: softprops/action-gh-release@v2
      with:
        files: |
          artifacts/TheCharter3000-Windows/TheCharter3000-Windows.zip
          artifacts/TheCharter3000-macOS/TheCharter3000-macOS.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
